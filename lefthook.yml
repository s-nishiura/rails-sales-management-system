pre-commit:
  parallel: true
  jobs:
    - name: pinact
      run: pinact run
      stage_fixed: true

    - name: brakeman
      run: bundle exec brakeman --no-pager

    - name: rubocop
      glob: "*.rb"
      run: bundle exec rubocop --autocorrect --force-exclusion {staged_files}
      stage_fixed: true
